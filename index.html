<!DOCTYPE html>
<html>
<head>
  <title>I LOVE YOU!</title>
  <style>
    body {
      background: #050816;
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      margin: 0;
      overflow: hidden;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* Neon blue glowing text */
    h1 {
      font-size: 4rem;
      margin: 0;
      color: #4cc9ff;
      text-shadow:
        0 0 10px #4cc9ff,
        0 0 20px #4cc9ff,
        0 0 40px #00b4ff,
        0 0 80px #0094cc;
    }

    .photo {
      width: 250px;
      margin-top: 20px;
      border-radius: 20px;
      display: block;
    }

    .heart {
      font-size: 5rem;
      margin-top: 15px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    /* Fireworks */
    .firework {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: transparent;
      box-shadow:
        0 0 0 2px #ff4b81,
        20px 0 0 2px #ffd166,
        -20px 0 0 2px #4cc9f0,
        0 20px 0 2px #f72585,
        0 -20px 0 2px #bde0fe,
        14px 14px 0 2px #ff9f1c,
        -14px 14px 0 2px #80ffdb,
        14px -14px 0 2px #ff595e,
        -14px -14px 0 2px #c77dff;
      animation: explode 1.5s infinite;
      pointer-events: none;
    }

    .firework:nth-child(1) { top: 20%; left: 20%; animation-delay: 0s; }
    .firework:nth-child(2) { top: 30%; right: 15%; animation-delay: 0.3s; }
    .firework:nth-child(3) { bottom: 25%; left: 30%; animation-delay: 0.6s; }
    .firework:nth-child(4) { bottom: 20%; right: 25%; animation-delay: 0.9s; }

    @keyframes explode {
      0% { transform: scale(0); opacity: 1; }
      70% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    /* Confetti pieces */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: red;
      top: -20px;
      opacity: 0.9;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Fireworks -->
  <div class="firework"></div>
  <div class="firework"></div>
  <div class="firework"></div>
  <div class="firework"></div>

  <h1>I LOVE YOU!</h1>

  <img src="marcela.jpg" class="photo" alt="Image">

  <div class="heart">❤️</div>

  <!-- Music button -->
  <button class="music-btn" onclick="document.getElementById('music').play()">
    🎵 Click here
  </button>

  <!-- Audio element -->
  <audio id="music">
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Confetti generator
    function launchConfetti() {
      for (let i = 0; i < 80; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        // Random colors
        confetti.style.backgroundColor =
          ["#ff4b81", "#ffd166", "#4cc9f0", "#80ffdb", "#ff595e"][Math.floor(Math.random() * 5)];

        // Random horizontal position
        confetti.style.left = Math.random() * 100 + "vw";

        // Random size
        const size = Math.random() * 8 + 6;
        confetti.style.width = size + "px";
        confetti.style.height = size + "px";

        // Random animation duration
        confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";

        document.body.appendChild(confetti);

        // Remove after animation
        setTimeout(() => confetti.remove(), 4000);
      }
    }

    // Launch confetti on page load
    window.onload = launchConfetti;
  </script>

</body>
</html>
